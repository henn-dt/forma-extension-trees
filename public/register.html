<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HENN - Register</title>
    <style>
        @font-face {
            font-family: 'NB Grotesk';
            src: url('fonts/NBGROTESK-REGULAR.OTF') format('opentype');
            font-weight: normal;
        }

        @font-face {
            font-family: 'NB Grotesk';
            src: url('fonts/NBGROTESK-BOLD.OTF') format('opentype');
            font-weight: bold;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'NB Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f5510a 0%, #f5510a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-card {
            background: white;
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 440px;
        }

        .logo {
            width: 80px;
            margin: 0 auto 32px;
            display: block;
        }

        h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #f5510a;
        }

        .password-field {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }

        .password-toggle:hover {
            color: #333;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #f5510a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
            margin-top: 10px;
        }

        .btn:hover {
            background: #d94609;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .link a {
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 500;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .consent-group {
            margin: 20px 0;
            padding: 16px;
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }

        .consent-group label {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 0;
            font-weight: normal;
            font-size: 13px;
            line-height: 1.5;
            color: #444;
            cursor: pointer;
        }

        .consent-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            flex-shrink: 0;
            cursor: pointer;
            accent-color: #f5510a;
        }

        .consent-group .consent-highlight {
            font-weight: 500;
            color: #1a1a1a;
        }

        .consent-error {
            color: #c33;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }

        .policy-link {
            color: #f5510a;
            text-decoration: underline;
            font-weight: 500;
        }

        .policy-link:hover {
            color: #d94609;
        }
    </style>
</head>

<body>
    <div class="register-card">
        <img src="logo-HENN.png" alt="HENN Logo" class="logo">
        <h1>Create Account</h1>
        <p class="subtitle">Join the Forma Tree Detection platform</p>

        <div id="error" class="error" style="display: none;"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required autofocus>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="your.email@henn.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-field">
                    <input type="password" id="password" placeholder="At least 6 characters" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('password', this)" aria-label="Toggle password visibility">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-field">
                    <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)" aria-label="Toggle password visibility">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="consent-group" id="consentGroup" style="display: none;">
                <label for="dataConsent">
                    <input type="checkbox" id="dataConsent">
                    <span>
                        I have read and agree to the <a href="privacy" id="policyLink" target="_blank" rel="noopener noreferrer" class="policy-link">data protection policy</a>.
                    </span>
                </label>
                <div class="consent-error" id="consentError">You must agree to the data protection policy to create an account.</div>
            </div>

            <button type="submit" class="btn" id="submitBtn">Create Account</button>
        </form>

        <div class="link">
            Already have an account? <a href="login.html" id="loginLink">Sign in</a>
        </div>
    </div>

    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            btn.innerHTML = isPassword
                ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        }

        // Preserve query params in the login link
        document.getElementById('loginLink').href = 'login.html' + window.location.search;

        const form = document.getElementById('registerForm');
        const errorDiv = document.getElementById('error');
        const submitBtn = document.getElementById('submitBtn');

        const consentGroup = document.getElementById('consentGroup');
        const consentCheckbox = document.getElementById('dataConsent');
        const consentError = document.getElementById('consentError');
        const policyLink = document.getElementById('policyLink');
        let isPolicyRequired = false;

        async function initPrivacyConsent() {
            try {
                const response = await fetch('api/privacy-config', {
                    credentials: 'include'
                });

                if (!response.ok) {
                    throw new Error(`privacy-config request failed (${response.status})`);
                }

                const config = await response.json();

                if (config?.enabled) {
                    isPolicyRequired = true;
                    consentGroup.style.display = 'block';
                    if (config.url) {
                        policyLink.href = config.url;
                    }
                }
            } catch (error) {
                // Fail-open: if config endpoint is unavailable, registration remains possible.
                console.warn('Privacy policy config unavailable. Consent checkbox disabled.', error);
                isPolicyRequired = false;
                consentGroup.style.display = 'none';
            }
        }

        initPrivacyConsent();

        // Hide consent error when checkbox is checked
        consentCheckbox.addEventListener('change', () => {
            if (consentCheckbox.checked) {
                consentError.style.display = 'none';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.style.display = 'none';
            consentError.style.display = 'none';

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (isPolicyRequired && !consentCheckbox.checked) {
                consentError.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';

            try {
                const response = await fetch('api/register', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Preserve Forma's query parameters when redirecting
                    window.location.href = 'login.html' + window.location.search;
                } else {
                    errorDiv.textContent = data.error || 'Registration failed';
                    errorDiv.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            } catch (error) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>

</html>
